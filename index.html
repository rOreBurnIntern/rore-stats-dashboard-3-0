<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rORE Stats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js" defer></script>
    <script src="/app.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="page-header shell">
      <div>
        <h1 class="dashboard-title">rORE Stats</h1>
        <p id="last-updated">Last updated: --</p>
        <p class="source" id="source-label">Source: --</p>
      </div>
      <button id="theme-toggle" class="toggle" type="button" aria-label="Toggle color theme">Dark mode</button>
    </header>

    <main id="main" class="layout shell">
      <section aria-labelledby="stats-heading" class="section">
        <h2 id="stats-heading" class="section-title">Protocol Stats</h2>
        <div class="stats-grid">
          <article class="card stat-card">
            <h3>Motherlode</h3>
            <p id="motherlode-value">--</p>
          </article>
          <article class="card stat-card">
            <h3>WETH</h3>
            <p id="weth-value">--</p>
          </article>
          <article class="card stat-card">
            <h3>rORE</h3>
            <p id="rore-value">--</p>
          </article>
        </div>
      </section>

      <section aria-labelledby="charts-heading" class="section">
        <div class="section-head">
          <h2 id="charts-heading" class="section-title">Round Analytics</h2>
          <div class="filters" role="group" aria-label="Time range filters">
            <button type="button" class="filter-btn active" data-range="24h">24H</button>
            <button type="button" class="filter-btn" data-range="7d">7D</button>
            <button type="button" class="filter-btn" data-range="all">ALL</button>
          </div>
        </div>

        <div id="loading" class="state">Loading stats...</div>
        <div id="error" class="state hidden" role="alert"></div>
        <div id="empty" class="state hidden">No round data available for this range.</div>

        <div id="charts" class="chart-grid hidden">
          <article class="card chart-card">
            <h3>Winner Type Distribution</h3>
            <canvas id="pie-chart" class="chart-canvas chart-canvas--pie" aria-label="Winner type distribution pie chart"></canvas>
          </article>
          <article class="card chart-card">
            <h3>Wins Per Block (0-24)</h3>
            <canvas id="bar-chart" class="chart-canvas" aria-label="Wins per block bar chart"></canvas>
          </article>
          <article class="card chart-card chart-wide">
            <h3>Motherlode Running Value</h3>
            <canvas id="line-chart" class="chart-canvas chart-canvas--wide" aria-label="Motherlode history line chart"></canvas>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
